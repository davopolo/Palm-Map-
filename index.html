<!--
============================================================
  EDIT FACILITY INFO + RULES IN THE TWO OBJECTS NEAR THE
  BOTTOM (FACILITY and RULES). Nothing else needs touching.
============================================================
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --deck:#e6e3db; --deck2:#dcd8cd; --grass:#83bf4f; --line:#15407a; --ink:#0d3a66;
    --accent:#1b7fb0; --bldg:#cdae84; --bldgln:#bf9f6c; --bldgedge:#9a7b48; --bldgink:#5e4a2a;
    --stone:#b6b0a6; --red:#e0463c; --gold:#e8a93f; --tblue:#2f7fb0;
    --shadow:rgba(13,58,102,.18);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#eaf6fb,#d6ecf5); color:var(--ink);
    display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:500px;padding:16px 14px 40px;}
  header{text-align:center;margin-bottom:4px;}
  .fac-name{font-size:1.45rem;font-weight:800;letter-spacing:-.5px;}
  .fac-sub{font-size:.82rem;color:var(--accent);font-weight:600;margin-top:2px;}
  .hint{text-align:center;font-size:.8rem;color:#5a7a96;margin:10px 0 12px;
    display:flex;align-items:center;justify-content:center;gap:6px;}
  .hint .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(27,127,176,.5)}70%{box-shadow:0 0 0 10px rgba(27,127,176,0)}100%{box-shadow:0 0 0 0 rgba(27,127,176,0)}}

  .mapcard{background:#fff;border-radius:22px;padding:10px;box-shadow:0 12px 34px var(--shadow);position:relative;}
  svg{width:100%;height:auto;display:block;border-radius:14px;}

  .zone{cursor:pointer;}
  .zfill{transition:filter .15s;}
  .zone:hover .zfill,.zone:active .zfill{filter:brightness(1.06);}
  .hl{opacity:0;transition:opacity .15s;}
  .zone:hover .hl,.zone:active .hl{opacity:1;}
  .flash .hl{animation:flashpulse 2.1s ease-in-out;}
  @keyframes flashpulse{0%{opacity:0}14%{opacity:1}28%{opacity:0}42%{opacity:1}56%{opacity:0}100%{opacity:0}}
  .deco{pointer-events:none;}

  /* tap-to-start cover */
  .cover{position:absolute;inset:10px;border-radius:14px;z-index:5;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:linear-gradient(150deg,var(--ink),var(--accent));color:#fff;padding:28px;
    transition:opacity .45s ease;}
  .cover.hide{opacity:0;pointer-events:none;}
  .cover .crest{width:92px;height:92px;border-radius:50%;background:rgba(255,255,255,.14);
    border:2px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;
    margin-bottom:20px;overflow:hidden;}
  .cover .crest img{width:100%;height:100%;object-fit:contain;}
  .cover .crest .ph{font-size:.6rem;font-weight:800;letter-spacing:.6px;opacity:.85;text-align:center;line-height:1.3;}
  .cover .ctitle{font-size:1.32rem;font-weight:800;line-height:1.32;max-width:300px;}
  .cover .csub{margin-top:18px;font-size:.85rem;font-weight:600;opacity:.95;letter-spacing:.3px;
    background:rgba(255,255,255,.16);padding:9px 16px 9px 13px;border-radius:999px;
    display:flex;align-items:center;gap:8px;}
  .cover .tapico{display:inline-flex;animation:tapbob 1.6s ease-in-out infinite;}
  .cover .tapico svg{width:20px;height:22px;display:block;}
  @keyframes tapbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  .genbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    margin-top:14px;padding:15px;border:none;border-radius:16px;
    background:linear-gradient(135deg,var(--ink),var(--accent));color:#fff;
    font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(13,58,102,.3);}
  .genbtn:active{transform:translateY(1px);}

  .scrim{position:fixed;inset:0;background:rgba(13,40,70,.45);opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:10;backdrop-filter:blur(2px);}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:11;max-width:500px;margin:0 auto;
    background:#fff;border-radius:24px 24px 0 0;transform:translateY(110%);
    transition:transform .32s cubic-bezier(.22,1,.36,1);box-shadow:0 -10px 40px rgba(0,0,0,.2);
    max-height:82vh;display:flex;flex-direction:column;}
  .sheet.show{transform:translateY(0);}
  .grip{width:42px;height:5px;border-radius:3px;background:#d4dde6;margin:10px auto 4px;}
  .sheet-head{padding:6px 22px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #eef2f6;}
  .sheet-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
  .sheet-title{font-size:1.2rem;font-weight:800;}
  .sheet-tag{font-size:.75rem;color:var(--accent);font-weight:600;}
  .close{margin-left:auto;background:#f0f4f8;border:none;width:34px;height:34px;border-radius:50%;font-size:1.1rem;cursor:pointer;color:#5a7a96;}
  .sheet-body{padding:16px 22px 30px;overflow-y:auto;}
  .rule{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f3f6f9;font-size:.95rem;line-height:1.4;}
  .rule:last-child{border-bottom:none;}
  .rule .chk{color:var(--accent);font-weight:800;flex-shrink:0;}
  .genlink{margin-top:14px;padding:13px 14px;border-radius:12px;background:#eef4f9;color:var(--accent);
    font-size:.9rem;font-weight:700;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .genlink:active{background:#e2edf5;}
</style>

<script>
const FACILITY = { name:"Palm Park Aquatic Center", sub:"Recreational Swim — Rules & Safety" };

const RULES = {
  general:{ title:"General Pool Rules", tag:"Applies to the Entire Pool", icon:"📋", color:"#0d3a66",
    rules:["No running on the pool deck. PLEASE WALK at all times.",
      "No hanging on the lane lines, they may become damaged and snap.",
      "No floatation devices or life-jackets allowed in the water. Floaties provide a false sense of security to both parents and children using them, leading to a higher likelihood of drowning when these devices malfunction or slip off.",
      "No balls, dive toys or kick boards allowed during Rec Swim.",
      "Shoulder rides and chicken fights are not allowed. Any type of rough-housing should be avoided.",
      "Only appropriate swim attire is allowed in the water. No cotton, jeans or mesh materials allowed as these materials get extremely heavy when wet. Polyester shirts and rash-guards are okay.",
      "Stay out of the diving board area unless you are using the board, this area is not meant for free swimming through.",
      "Follow the rules that apply to each section of the pool, some areas have special rules that only apply to them.",
      "Listen to lifeguards at all times. The main role of a lifeguard is accident prevention. If a lifeguard is addressing you directly, it means that they noticed something that could put you at risk. For your own safety, please obey any directions that lifeguards may provide."]},
  shallow:{ title:"Shallow End", tag:"Best for Non-Swimmers & Kids", icon:"🩴", color:"#1b7fb0",
    rules:["The Shallow End goes from a depth of 3.5 - 4.5 feet.",
      "Recommended for swimmers who are not confident in their ability to support themselves in deeper water.",
      "Absolutely no diving allowed in the shallow end.",
      "Children unable to swim on their own or stand on the bottom of the pool should always be within an arm's reach of a supervising adult.",
      "One at a time on ladders, keep the area clear for those that need access.",
      "No chicken fights, rough-housing or shoulder rides."]},
  deep:{ title:"Deep End", tag:"Confident Swimmers Only", icon:"🌊", color:"#2a9fd6",
    rules:["This entire area spans from 5 - 12 feet, so standing is not an option in this area.",
      "Meant for patrons who are confident in their abilities to swim and tread water without needing to rest at the bottom.",
      "Diving is allowed in the deep end, HOWEVER, this should only be done from the side and NOT off the dive blocks.",
      "Avoid hanging out at the bottom of the pool in this area, it is the most difficult area to notice."]},
  diving:{ title:"Diving Board", tag:"One Diver at a Time", icon:"🤿", color:"#16407a",
    rules:["Only use when you are confident in your ability to swim in deep water.",
      "One person at a time on the diving board.",
      "Absolutely no running on the diving board.",
      "No backwards jumps, no back-flips, no jumping to the side of the board. One bounce and forward jump or dive is fine.",
      "Once you have dove in, please exit through the ladder near the lifeguard tower. DO NOT swim directly to the deep end.",
      "Listen to lifeguard instructions anytime while on the diving board."]},
  lifeguard:{ title:"Lifeguard Stations", tag:"Towers & Roaming Posts", icon:"🛟", color:"#d9433a",
    rules:["Listen to all lifeguards at all times. They have the authority to ask you to exit the pool if you are not following pool rules.",
      "You may ask guards a question, but do not hold extended conversations or distract them in any way. If you have a complicated question, please approach the canopy or ask a lifeguard who is not actively scanning on duty.",
      "Guards are located in three areas: roaming under the umbrella near the shallow end, on tower near the diving board area, and on tower in between the shallow and deep end sections.",
      "Lifeguards yell to get your attention, not to be mean. If you listen to their directions, the less they will need to yell."]},
  bleachers:{ title:"Bleacher / Spectator Area", tag:"Stone-Step Seating", icon:"🪑", color:"#7a6a52",
    rules:["Spectators that are not swimming or using facilities must stay in the bleacher area at all times.",
      "Patrons are allowed to leave their belongings on the bleachers, but are responsible for keeping watch over their own things.",
      "The fence in front of the bleacher area is meant to keep spectators off the pool deck, please do not hang on or jump over them.",
      "No climbing or sitting on the wall behind the bleachers."]},
  payment:{ title:"Entry & Cash Payment", tag:"Gate & Cash Canopy", icon:"💵", color:"#b5791f",
    rules:["Access to Recreational Swim costs $3 per swimmer.",
      "Pay with cash at the canopy near the main gate.",
      "Card payments are only accepted during weekdays, and can be made inside the main facility building at the front desk.",
      "When paying with card, bring the receipt to the Rec Swim manager at the canopy before hopping in the water.",
      "Weekends are cash only, as the facility does not take electronic payments on Saturdays or Sundays."]},
  mens:{ title:"Men's Locker Room", tag:"Changing, Showers & Restrooms", icon:"🚹", color:"#1b7fb0",
    rules:["Showers are located in the locker rooms. Please use them anytime before getting in the pool.",
      "No running. Floors may be wet and slippery.",
      "You are responsible for all your possessions, please remember to take them home after using the facility.",
      "No photography or video in the locker rooms.",
      "Please flush toilets, throw away trash, and leave the locker rooms as you found them."]},
  womens:{ title:"Women's Locker Room", tag:"Changing, Showers & Restrooms", icon:"🚺", color:"#1b7fb0",
    rules:["Showers are located in the locker rooms. Please use them anytime before getting in the pool.",
      "No running. Floors may be wet and slippery.",
      "You are responsible for all your possessions, please remember to take them home after using the facility.",
      "No photography or video in the locker rooms.",
      "Please flush toilets, throw away trash, and leave the locker rooms as you found them."]},
  facility:{ title:"Rental Room & Facility", tag:"Building & Rentals", icon:"🏠", color:"#7a5a36",
    rules:["The Palm Park Aquatic Center facility is attached to the pool deck with direct locker room access. The facility is open for business from 8:00am - 5:00pm, Monday through Friday.",
      "A facility rental room is visible from the pool area, often utilized by the city for day-camp activities or meetings. This room is available to be rented for private events as well. Information on room rentals is available inside the main building, just approach one of the available secretaries up front.",
      "The patio is attached to the rental room and is only accessible through it."]},
  ada:{ title:"ADA Accessible Pool Lift", tag:"Accessible Entry & Exit", icon:"♿", color:"#3a7bd5",
    rules:["An ADA-compliant pool lift is located by the shallow end on the side nearest to the facility rental room.",
      "Available for any patrons that need assistance getting in and out of the pool.",
      "If you have any questions or issues about the ADA lift, feel free to ask a lifeguard for assistance."]},
};

document.getElementById("facName").textContent = FACILITY.name;
document.getElementById("facSub").textContent = FACILITY.sub;
const scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet");
const sIco=document.getElementById("sIco"),sTitle=document.getElementById("sTitle"),
  sTag=document.getElementById("sTag"),sBody=document.getElementById("sBody");
function openZone(k){const z=RULES[k];if(!z)return;
  sIco.textContent=z.icon;sIco.style.background=z.color+"22";
  sTitle.textContent=z.title;sTag.textContent=z.tag;
  let html=z.rules.map(r=>`<div class="rule"><span class="chk">✓</span><span>${r}</span></div>`).join("");
  if(k!=="general"){html+=`<div class="genlink" onclick="openZone('general')">📋 Tap to See General Pool Rules Here</div>`;}
  sBody.innerHTML=html;
  scrim.classList.add("show");sheet.classList.add("show");}
function closeSheet(){scrim.classList.remove("show");sheet.classList.remove("show");}
document.querySelectorAll(".zone").forEach(el=>el.addEventListener("click",()=>openZone(el.dataset.zone)));
document.querySelector(".genbtn").addEventListener("click",()=>openZone("general"));
document.getElementById("closeBtn").addEventListener("click",closeSheet);
scrim.addEventListener("click",closeSheet);

const cover=document.getElementById("cover");
const svgEl=document.querySelector(".mapcard svg");
cover.addEventListener("click",function(){
  cover.classList.add("hide");
  svgEl.classList.add("flash");
  setTimeout(function(){svgEl.classList.remove("flash");},2300);
});
</script>
